name: Send Email
description: 通过 SMTP 发送邮件

nodes:
  secrets:
    type: secret
    config:
      smtp_user: "{{env.SMTP_USERNAME}}"
      smtp_pass: "{{env.SMTP_PASSWORD}}"
    next: ["send"]

  send:
    type: shell
    config:
      # 这里我们假设系统安装了 swaks 或类似工具，或者通过 Python 脚本实现
      # 为了 Solid，我们这里先写一个 Python 逻辑封装
      script: |
        python3 -c "
        import smtplib
        from email.mime.text import MIMEText
        server = smtplib.SMTP('{{inputs.smtp_server}}', {{inputs.smtp_port}})
        server.starttls()
        server.login('$USER', '$PASS')
        msg = MIMEText('$BODY')
        msg['Subject'] = '$SUBJECT'
        msg['From'] = '$USER'
        msg['To'] = '{{inputs.to}}'
        server.send_message(msg)
        server.quit()
        "
      env:
        USER: "secrets.smtp_user"
        PASS: "secrets.smtp_pass"
        SUBJECT: "inputs.subject"
        BODY: "inputs.body"