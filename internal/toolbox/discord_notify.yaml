name: Discord Notify
description: 向 Discord Webhook 发送消息

data:
  webhook_url: ""
  message: ""

nodes:
  send_discord:
    type: api
    config:
      method: "POST"
      url: webhook_url
      headers:
        Content-Type: "application/json"
      body:
        content: message
        username: "Tofi Bot"
