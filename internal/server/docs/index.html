<!DOCTYPE html>
<html>
<head>
  <title>Tofi API Reference</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* Dark mode: flat background, tofi brand colors */
    .dark-mode {
      --scalar-color-1: #f0f6fc;
      --scalar-color-accent: #ff7b72;
      --scalar-background-1: #0d1117;
      --scalar-background-2: #161b22;
      --scalar-background-3: #21262d;
      --scalar-border-color: #30363d;
    }
    .dark-mode .section-header,
    .dark-mode .scalar-api-reference__header {
      background: #0d1117 !important;
      background-image: none !important;
    }

    /* Light mode: clean white, accent color only */
    .light-mode {
      --scalar-color-accent: #d1462f;
    }

    /* Remove gradient in both modes */
    .introduction-card {
      background-image: none !important;
    }
  </style>
</head>
<body>
  <script
    id="api-reference"
    data-url="/api/docs/openapi.yaml"
    data-configuration='{
      "theme": "none",
      "darkMode": true,
      "layout": "modern",
      "hideDownloadButton": true
    }'
  ></script>
  <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
</body>
</html>
