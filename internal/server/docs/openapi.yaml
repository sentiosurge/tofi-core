openapi: 3.0.3
info:
  title: Tofi API
  version: 0.1.7
  description: |
    Tofi is an AI App Engine. Create AI-powered apps that run on a schedule
    or on-demand, with results delivered to your preferred channels.

    ## Authentication
    All endpoints (except login) require a Bearer token in the Authorization header:
    ```
    Authorization: Bearer <your-jwt-token>
    ```

    ## Quick Start

    **Step 1: Login**
    ```bash
    curl -X POST https://tofi.sentiosurge.com/api/v1/auth/login \
      -H "Content-Type: application/json" \
      -d '{"username": "your-username", "password": "your-password"}'
    ```
    Save the `token` from the response.

    **Step 2: Check your status**
    ```bash
    curl https://tofi.sentiosurge.com/api/v1/auth/me \
      -H "Authorization: Bearer YOUR_TOKEN"
    ```
    This shows your configured AI providers. If `ai_keys` is empty, go to Step 3.

    **Step 3: Set your AI key**
    ```bash
    curl -X PUT https://tofi.sentiosurge.com/api/v1/user/settings/ai-key \
      -H "Authorization: Bearer YOUR_TOKEN" \
      -H "Content-Type: application/json" \
      -d '{"provider": "openai", "api_key": "sk-..."}'
    ```
    Supported providers: `openai`, `anthropic`, `gemini`, `deepseek`, `groq`, `openrouter`

    **Step 4: Start chatting**
    ```bash
    # Create a session
    curl -X POST https://tofi.sentiosurge.com/api/v1/chat/sessions \
      -H "Authorization: Bearer YOUR_TOKEN" \
      -H "Content-Type: application/json" \
      -d '{}'

    # Send a message (SSE stream)
    curl -N -X POST https://tofi.sentiosurge.com/api/v1/chat/sessions/SESSION_ID/messages \
      -H "Authorization: Bearer YOUR_TOKEN" \
      -H "Content-Type: application/json" \
      -d '{"message": "Hello!"}'
    ```

    **Step 5: Or use Apps**
    ```bash
    curl https://tofi.sentiosurge.com/api/v1/apps \
      -H "Authorization: Bearer YOUR_TOKEN"
    ```

    ## Error Format
    All errors return JSON:
    ```json
    {"error": {"code": "NO_AI_KEY", "message": "...", "hint": "..."}}
    ```
    The `hint` field (when present) tells you exactly what to do next.

servers:
  - url: https://tofi.sentiosurge.com
    description: Production
  - url: http://localhost:8321
    description: Local development

security:
  - bearerAuth: []

paths:
  /api/v1/auth/login:
    post:
      summary: Login
      description: |
        Authenticate with username and password to receive a JWT token.
        Use this token in the Authorization header for all other endpoints.
        No authentication required for this endpoint.
      operationId: login
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
            example:
              username: "alice"
              password: "your-password"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT token (valid for 365 days)
                  username:
                    type: string
                  role:
                    type: string
                    enum: [admin, user]
              example:
                token: "eyJhbGciOiJIUzI1NiIs..."
                username: "alice"
                role: "user"
        '401':
          description: Invalid username or password

  /api/v1/auth/me:
    get:
      summary: Get Current User
      description: |
        Returns your user profile and AI key configuration status.
        Use this after login to check which AI providers are available.
      operationId: getMe
      tags: [Auth]
      responses:
        '200':
          description: User profile with AI key status
          content:
            application/json:
              schema:
                type: object
                properties:
                  username:
                    type: string
                  role:
                    type: string
                    enum: [admin, user]
                  ai_keys:
                    type: array
                    description: Status of each AI provider
                    items:
                      type: object
                      properties:
                        provider:
                          type: string
                        has_key:
                          type: boolean
                        source:
                          type: string
                          enum: [user, system, ""]
                          description: "\"user\" = your own key, \"system\" = admin-provided key"
              example:
                username: "alice"
                role: "user"
                ai_keys:
                  - provider: "openai"
                    has_key: true
                    source: "system"
                  - provider: "anthropic"
                    has_key: true
                    source: "user"
                  - provider: "gemini"
                    has_key: false
                    source: ""

  /api/v1/chat/sessions:
    post:
      summary: Create Chat Session
      description: |
        Create a new chat session. All fields are optional.
        Use the returned `id` to send messages.
      operationId: createChatSession
      tags: [Chat]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                model:
                  type: string
                  description: LLM model to use (auto-detected if omitted)
                scope:
                  type: string
                  description: Session scope (empty for general chat)
                skills:
                  type: array
                  items:
                    type: string
                  description: Skill names to enable
            example:
              model: "claude-sonnet-4-20250514"
              skills: ["web-search"]
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  scope:
                    type: string
                  model:
                    type: string
                  skills:
                    type: array
                    items:
                      type: string
                  created:
                    type: string
              example:
                id: "s_a1b2c3d4e5f6"
                scope: ""
                model: "claude-sonnet-4-20250514"
                skills: ["web-search"]
                created: "2026-03-24T10:00:00Z"
    get:
      summary: List Chat Sessions
      description: Returns chat sessions for the authenticated user.
      operationId: listChatSessions
      tags: [Chat]
      parameters:
        - name: scope
          in: query
          description: Filter by scope. Omit to list all scopes.
          schema:
            type: string
      responses:
        '200':
          description: Array of chat sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    scope:
                      type: string
                    model:
                      type: string
                    title:
                      type: string
                    updated_at:
                      type: string

  /api/v1/chat/sessions/{id}/messages:
    post:
      summary: Send Message (SSE Stream)
      description: |
        Send a message in a chat session. Returns a Server-Sent Events (SSE) stream.

        **SSE Events:**
        - `connected` — session connected
        - `chunk` — streaming text chunk from the AI
        - `tool_call` — AI is calling a tool
        - `error` — an error occurred (includes `code`, `error`, `hint` fields)
        - `done` — response complete (includes `result`, `model`, token usage)

        **Common error codes in SSE:**
        - `NO_AI_KEY` — no API key configured (hint tells you how to set one)
        - `NO_AI_KEY_FOR_MODEL` — no key for the requested model
      operationId: sendChatMessage
      tags: [Chat]
      parameters:
        - name: id
          in: path
          required: true
          description: Chat session ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
            example:
              message: "What is the weather today?"
      responses:
        '200':
          description: SSE stream of AI response
          content:
            text/event-stream:
              schema:
                type: string
        '400':
          description: Message is required
        '404':
          description: Session not found

  /api/v1/models:
    get:
      summary: List Available Models
      description: |
        Returns all known LLM models with their provider, context window, and pricing.
        Use `?enabled=true` to filter to only your enabled models.
      operationId: listModels
      tags: [Settings]
      parameters:
        - name: enabled
          in: query
          description: If "true", only return models enabled for your account
          schema:
            type: string
      responses:
        '200':
          description: Array of models
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    provider:
                      type: string
                    context_window:
                      type: integer
                    input_cost_per_1m:
                      type: number
                    output_cost_per_1m:
                      type: number

  /api/v1/skills:
    get:
      summary: List Skills
      description: Returns all skills installed by the authenticated user.
      operationId: listSkills
      tags: [Skills]
      parameters:
        - name: q
          in: query
          description: Search filter
          schema:
            type: string
      responses:
        '200':
          description: Array of skills
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Skill'

  /api/v1/skills/install:
    post:
      summary: Install Skill
      description: |
        Install a skill from Git URL, registry reference, or raw SKILL.md content.

        **From Git URL:** `{"source": "git", "url": "github.com/user/repo"}`
        **From content:** `{"source": "local", "content": "---\nname: my-skill\n..."}`
        **Two-phase (preview):** `{"mode": "preview", "url": "github.com/user/repo"}`
        **Two-phase (confirm):** `{"mode": "confirm", "session_id": "xxx", "skill_names": ["skill1"]}`
      operationId: installSkill
      tags: [Skills]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                source:
                  type: string
                  enum: [local, git]
                content:
                  type: string
                  description: SKILL.md content (source=local)
                url:
                  type: string
                  description: Git URL or owner/repo (source=git)
                mode:
                  type: string
                  enum: [preview, confirm]
                session_id:
                  type: string
                skill_names:
                  type: array
                  items:
                    type: string
            examples:
              fromGit:
                summary: Install from GitHub
                value:
                  source: "git"
                  url: "github.com/user/skills-repo"
              fromContent:
                summary: Install from SKILL.md content
                value:
                  source: "local"
                  content: "---\nname: my-skill\ndescription: My custom skill\n---\nYou are a helpful assistant."
      responses:
        '201':
          description: Skill installed
        '400':
          description: Invalid request

  /api/v1/skills/install-zip:
    post:
      summary: Install Skill from ZIP
      description: Upload a ZIP file containing one or more SKILL.md files.
      operationId: installSkillZip
      tags: [Skills]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: ZIP file (max 50MB)
      responses:
        '201':
          description: Skills installed
        '400':
          description: Invalid file

  /api/v1/skills/{id}:
    delete:
      summary: Delete Skill
      description: Remove a skill from your workspace.
      operationId: deleteSkill
      tags: [Skills]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Skill deleted
        '404':
          description: Skill not found

  /api/v1/registry/search:
    get:
      summary: Search Skill Registry
      description: Search skills.sh for available skills to install.
      operationId: searchRegistry
      tags: [Skills]
      parameters:
        - name: q
          in: query
          required: true
          description: Search query
          schema:
            type: string
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  skills:
                    type: array
                    items:
                      type: object
                  total:
                    type: integer

  /api/v1/user/settings/ai-key:
    put:
      summary: Set AI Key
      description: |
        Set your own AI provider API key. Keys are encrypted with AES-256-GCM.
        Admin can disable this feature via `allow_user_keys` setting.
      operationId: userSetAIKey
      tags: [Settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider, api_key]
              properties:
                provider:
                  type: string
                  enum: [openai, anthropic, gemini, deepseek, groq, openrouter]
                api_key:
                  type: string
            example:
              provider: "anthropic"
              api_key: "sk-ant-..."
      responses:
        '200':
          description: Key saved
        '403':
          description: User keys disabled by admin

  /api/v1/user/settings/ai-keys:
    get:
      summary: List AI Keys
      description: Returns your configured AI keys (masked). Also shows whether user keys are enabled.
      operationId: userListAIKeys
      tags: [Settings]
      responses:
        '200':
          description: AI key list
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      type: object
                      properties:
                        provider:
                          type: string
                        masked_key:
                          type: string
                        updated_at:
                          type: string
                  allow_user_keys:
                    type: boolean

  /api/v1/user/settings/ai-key/{provider}:
    delete:
      summary: Delete AI Key
      description: Remove your API key for a specific provider.
      operationId: userDeleteAIKey
      tags: [Settings]
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Key deleted

  /api/v1/apps:
    get:
      summary: List Apps
      description: Returns all apps belonging to the authenticated user.
      operationId: listApps
      tags: [Apps]
      responses:
        '200':
          description: Array of apps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/App'
              example:
                - id: "daily-stock-briefing"
                  name: "Daily Stock Briefing"
                  description: "AI-generated stock market summary"
                  model: "claude-sonnet-4-20250514"
                  is_active: true
                  created_at: "2026-03-23 10:00:00"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/apps/{id}:
    get:
      summary: Get App
      description: Returns details of a single app.
      operationId: getApp
      tags: [Apps]
      parameters:
        - $ref: '#/components/parameters/AppId'
      responses:
        '200':
          description: App details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/App'
        '404':
          description: App not found

  /api/v1/apps/{id}/run:
    post:
      summary: Trigger App Run
      description: |
        Manually triggers an app run. The run executes asynchronously in the background.
        Returns immediately with a run record containing the `id` (job ID) that you can
        use to poll for status and results.

        Optionally pass a `prompt` in the request body to override the app's configured
        prompt for this run only.
      operationId: triggerAppRun
      tags: [Runs]
      parameters:
        - $ref: '#/components/parameters/AppId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunRequest'
            examples:
              withoutPrompt:
                summary: Use app's default prompt
                value: {}
              withPrompt:
                summary: Override prompt for this run
                value:
                  prompt: "Focus on NVDA and TSLA only, include after-hours trading data"
      responses:
        '201':
          description: Run created and dispatched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'
              example:
                id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                app_id: "daily-stock-briefing"
                status: "running"
                trigger: "manual"
                created_at: "2026-03-23 14:30:00"
                started_at: "2026-03-23 14:30:00"
        '400':
          description: App has no prompt configured
        '404':
          description: App not found

  /api/v1/apps/{id}/runs:
    get:
      summary: List App Runs
      description: Returns run history for an app, ordered by most recent first.
      operationId: listAppRuns
      tags: [Runs]
      parameters:
        - $ref: '#/components/parameters/AppId'
        - name: status
          in: query
          description: Filter by status
          schema:
            type: string
            enum: [pending, running, done, failed, cancelled, skipped]
        - name: limit
          in: query
          description: Maximum number of runs to return (default 50)
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Array of runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Run'
        '404':
          description: App not found

  /api/v1/apps/{id}/runs/{runId}:
    get:
      summary: Get Run Status & Result
      description: |
        Returns the current status and result of a specific run.
        Poll this endpoint to check if an async run has completed.

        **Status flow:** `running` → `done` (success) or `failed` (error)

        When `status` is `done`, the `result` field contains the AI-generated output.
      operationId: getAppRun
      tags: [Runs]
      parameters:
        - $ref: '#/components/parameters/AppId'
        - name: runId
          in: path
          required: true
          description: Run ID (returned by trigger endpoint)
          schema:
            type: string
      responses:
        '200':
          description: Run details with status and result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'
              examples:
                running:
                  summary: Run still in progress
                  value:
                    id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    app_id: "daily-stock-briefing"
                    status: "running"
                    trigger: "manual"
                    result: ""
                    created_at: "2026-03-23 14:30:00"
                    started_at: "2026-03-23 14:30:00"
                done:
                  summary: Run completed with result
                  value:
                    id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    app_id: "daily-stock-briefing"
                    status: "done"
                    trigger: "manual"
                    result: "## Stock Market Summary\n\n**AAPL** (+1.2%): Strong earnings beat..."
                    created_at: "2026-03-23 14:30:00"
                    started_at: "2026-03-23 14:30:00"
                    completed_at: "2026-03-23 14:31:15"
        '404':
          description: Run not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained via POST /api/v1/auth/login

  parameters:
    AppId:
      name: id
      in: path
      required: true
      description: App ID
      schema:
        type: string

  responses:
    Unauthorized:
      description: Missing or invalid Authorization header

  schemas:
    App:
      type: object
      properties:
        id:
          type: string
          description: Unique app identifier (kebab-case)
        name:
          type: string
          description: Display name
        description:
          type: string
        model:
          type: string
          description: LLM model used (e.g. claude-sonnet-4-20250514)
        is_active:
          type: boolean
          description: Whether scheduled runs are enabled
        skills:
          type: string
          description: JSON array of skill names
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    RunRequest:
      type: object
      properties:
        prompt:
          type: string
          description: Optional prompt override for this run only. If omitted, the app's configured prompt is used.

    Run:
      type: object
      properties:
        id:
          type: string
          description: Unique run ID (UUID) — use this to poll for status
        app_id:
          type: string
        status:
          type: string
          enum: [pending, running, done, failed, cancelled, skipped]
          description: |
            - `pending`: Queued, waiting to execute
            - `running`: Currently executing
            - `done`: Completed successfully (check `result`)
            - `failed`: Execution failed
            - `cancelled`: Cancelled before execution
            - `skipped`: Skipped by user
        trigger:
          type: string
          enum: [manual, scheduled]
          description: How this run was initiated
        result:
          type: string
          description: AI-generated output (populated when status is `done`)
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time

    Skill:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        version:
          type: string
        scope:
          type: string
          enum: [public, private]
        source:
          type: string
        installed_at:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Machine-readable error code (e.g. NO_AI_KEY, BAD_REQUEST)
            message:
              type: string
              description: Human-readable error description
            hint:
              type: string
              description: Actionable suggestion (omitted when not applicable)
