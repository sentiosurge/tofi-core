name: Send Email
description: Send email via SMTP (supports Gmail, Outlook, custom SMTP)

nodes:
  send:
    type: shell
    input:
      script: |
        # Create email body file
        cat > /tmp/email_body_$$.txt << 'EMAILEOF'
        From: $FROM_EMAIL
        To: $TO_EMAIL
        Subject: $SUBJECT

        $BODY
        EMAILEOF

        # Send email using curl (supports SMTP)
        if [ -n "$SMTP_PASSWORD" ]; then
          curl --url "smtp://$SMTP_SERVER:$SMTP_PORT" \
            --ssl-reqd \
            --mail-from "$FROM_EMAIL" \
            --mail-rcpt "$TO_EMAIL" \
            --user "$SMTP_USERNAME:$SMTP_PASSWORD" \
            --upload-file /tmp/email_body_$$.txt

          # Check result and clean up
          RESULT=$?
          rm -f /tmp/email_body_$$.txt

          if [ "$RESULT" -eq 0 ]; then
            echo "Email sent successfully to $TO_EMAIL"
          else
            echo "Error: Failed to send email"
            exit 1
          fi
        else
          echo "Error: SMTP password not provided"
          rm -f /tmp/email_body_$$.txt
          exit 1
        fi
    env:
      SMTP_SERVER: "{{inputs.smtp_server}}"
      SMTP_PORT: "{{inputs.smtp_port}}"
      SMTP_USERNAME: "{{inputs.smtp_username}}"
      SMTP_PASSWORD: "{{inputs.smtp_password}}"
      FROM_EMAIL: "{{inputs.from}}"
      TO_EMAIL: "{{inputs.to}}"
      SUBJECT: "{{inputs.subject}}"
      BODY: "{{inputs.body}}"
