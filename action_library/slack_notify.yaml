name: Slack Notification
description: Send notifications to Slack channels via webhook

nodes:
  send:
    type: api
    config:
      method: "POST"
      url: "{{inputs.webhook_url}}"
    input:
      headers:
        Content-Type: "application/json"
      body: |
        {
          "text": "{{inputs.message}}",
          "username": "{{inputs.bot_name}}",
          "icon_emoji": "{{inputs.icon}}"
        }
