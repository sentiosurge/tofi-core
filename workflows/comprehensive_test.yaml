name: Comprehensive Test Workflow
data:
  topic: "Future of AI"
  limit: 3
  regions:
    - "us-east-1"
    - "eu-west-1"

secrets:
  openai_key: "{{env.OPENAI_API_KEY}}"

nodes:
  check.validity:
    name: Check Validity
    type: check
    input:
      - var:
          id: text_val
          value: data.topic # 引用 data.topic
    config:
      mode: "exists"
      value: text_val
    next: ["calc.threshold"]

  calc.threshold:
    name: Calc Threshold
    type: math
    input:
      - var:
          id: count
          value: data.limit # 引用 data.limit
      - var:
          id: min_val
          value: 1
    config:
      operator: ">="
      left: count
      right: min_val
    next: ["ai.generate"]

  ai.generate:
    name: AI Generate
    type: ai
    input:
      - var:
          id: prompt_text
          value: "Write a 1-sentence slogan about {{data.topic}} (Region: {{data.regions.0}})" # 引用 data.xxx
    config:
      provider: "openai"
      endpoint: "https://api.openai.com/v1/chat/completions"
      model: "gpt-3.5-turbo"
      api_key: "secrets.openai_key"
      prompt: prompt_text
    next: ["loop.print"]

  loop.print:
    name: Loop Print
    type: loop
    input:
      - var:
          id: loop_end
          value: data.limit # 引用 data.limit
    config:
      mode: "range"
      start: 1
      end: loop_end
      iterator: "i"
      task:
        type: shell
        input:
          - var:
              id: current_idx
              value: '\{{i}}'
          - var:
              id: slogan
              value: ai.generate
        config:
          script: 'echo "Run #$IDX: $SLOGAN"'
          env:
            IDX: current_idx
            SLOGAN: slogan