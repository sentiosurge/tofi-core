name: Echo Bot
description: 发送内容到指定的 Telegram 会话

# 声明契约
data:
  content: "Hello from Tofi!"

secrets:
  chatid: "" 

nodes:
  send_to_tg:
    name: Send Telegram
    type: workflow
    config:
      # 嫁接调用官方 Toolbox 组件
      uses: "tofi/telegram_notify"
      
      # 结构化传参
      data:
        message: data.content # 引用本地 data
        chat_id: secrets.chatid # 引用本地 secrets.chatid (注意：这里需要传给子工作流的 data.chat_id)
        # 等等，telegram_notify 需要 chat_id 是 data 还是 secrets?
        # telegram_notify 定义: data: { chat_id: "" }
        # 所以这里传给 data.chat_id 是对的。虽然源头是 secrets。