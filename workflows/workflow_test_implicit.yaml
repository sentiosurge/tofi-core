name: Implicit Resolution Demo
nodes:
  # 1. Simple Variable
  user_name:
    name: User Name
    type: var
    value: "Alice"
    next: ["config_data"]

  # 2. Complex JSON Data Producer
  config_data:
    name: Generate Config
    type: shell
    config:
      # Generates a JSON object
      script: 'echo "{\"theme\": \"dark\", \"retries\": 5, \"endpoints\": {\"primary\": \"api.prod.com\"}}"'
    next: ["display_implicit"]

  # 3. Test Case: Implicit Resolution
  display_implicit:
    name: Display Implicit
    type: shell
    config:
      # Define environment variables using Implicit References
      env:
        USER: user_name                # Matches node ID 'user_name'
        THEME: config_data.theme       # Matches path 'config_data.theme'
        RETRY: config_data.retries     # Matches path 'config_data.retries'
        HOST: config_data.endpoints.primary # Nested path
        LITERAL: "Just a string"       # No match, stays literal
      script: |
        echo "=== Implicit Resolution Results ==="
        echo "User:    $USER"
        echo "Theme:   $THEME"
        echo "Retry:   $RETRY"
        echo "Host:    $HOST"
        echo "Literal: $LITERAL"
    next: ["display_mixed"]

  # 4. Test Case: Mixed & Explicit
  display_mixed:
    name: Display Mixed
    type: shell
    config:
      env:
        # Standard interpolation still works
        GREETING: "Hello, {{user_name}}!" 
        # Implicit ref
        THEME_REF: config_data.theme
      script: |
        echo "=== Mixed Results ==="
        echo "Greeting: $GREETING"
        echo "Theme:    $THEME_REF"
